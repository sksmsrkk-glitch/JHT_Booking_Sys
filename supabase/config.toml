# @file 한글 책임: 로컬 Supabase 서비스의 포트, 인증, API 및 데이터베이스 실행 조건을 고정합니다.
# 팀원이 동일한 개발 환경을 재현할 수 있도록 CLI가 읽는 설정값만 관리하며 운영 비밀값은 저장하지 않습니다.

project_id = "jht-operations-platform"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/agency", "http://localhost:3000/admin"]
jwt_expiry = 3600
enable_signup = false

[storage]
enabled = true
